<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Order Details</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

    <style>
        body {
            background: #f4f6fb;
        }

        .page-header {
            background: linear-gradient(135deg, #0d6efd, #0a58ca);
            color: white;
            padding: 20px;
            border-radius: 12px;
        }

        .card-custom {
            border: none;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 6px 18px rgba(0,0,0,0.08);
        }

        .table thead {
            position: sticky;
            top: 0;
            z-index: 1;
        }

        tbody tr {
            transition: 0.2s;
        }

        tbody tr:hover {
            background: #eef5ff;
            cursor: pointer;
        }
    </style>
</head>

<body>

<section id="order-details" class="content-section">

    <div class="container mt-4">

        <!-- HEADER -->
        <div class="page-header d-flex justify-content-between align-items-center mb-3">
            <h4 class="mb-0">
                <i class="fa-solid fa-file-contract me-2"></i>Order Details
            </h4>

            <a href="index.html" class="btn btn-light btn-sm">
                <i class="fa fa-arrow-left me-1"></i> Back
            </a>
        </div>

        <!-- TABLE -->
        <div class="card card-custom">

            <div class="table-responsive" style="max-height: 500px; overflow-y: auto;">

                <table class="table table-hover mb-0 align-middle">

                    <thead class="table-dark">
                    <tr>
                        <th>Order ID</th>
                        <th>Date</th>
                        <th>Customer ID</th>
                        <th>Items</th>
                        <th>Total</th>
                        <th>Status</th>
                    </tr>
                    </thead>

                    <tbody id="orderHistoryBody"></tbody>

                </table>

            </div>

            <!-- EMPTY STATE -->
            <div id="no-orders-msg" class="text-center py-5 d-none">
                <i class="fa-solid fa-box-open fa-3x text-secondary opacity-25 mb-3"></i>
                <h6 class="text-muted">No Orders Found</h6>
            </div>

        </div>

    </div>

</section>

<!-- SCRIPTS (IMPORTANT FIX) -->
<script type="module" src="controller/OrderDetailsController.js"></script>
<script type="module" src="controller/SidebarController.js"></script>

</body>
</html>
