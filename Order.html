

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Order Management</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="p-4">

<h2 class="text-center mb-4">Order Management</h2>

<!-- from -->
<div class="container w-50">

    <form>

        <!-- order id -->
        <div class="mb-3">
            <label>Order ID</label>
            <input type="text" id="order_id" class="form-control">
        </div>

        <!-- customer id-->
        <div class="mb-3">
            <label>Customer ID</label>
            <input type="text" id="order_customer_id" class="form-control">
        </div>

        <!-- item id -->
        <div class="mb-3">
            <label>Item ID</label>
            <input type="text" id="order_item_id" class="form-control">
        </div>

        <!-- qty -->
        <div class="mb-3">
            <label>Quantity</label>
            <input type="number" id="order_qty" class="form-control">
        </div>
        <!-- price -->
        <div class="mb-3">
            <label>Price</label>
            <input type="number" id="order_price" class="form-control">
        </div>

        <!-- buttons -->
        <div class="text-end">
            <button type="button" id="order_save_btn" class="btn btn-success">Place Order</button>
            <button type="reset" id="order_reset_btn" class="btn btn-secondary">Reset</button>
        </div>

    </form>
</div>


<!-- table-->
<div class="container mt-5">

    <table class="table table-bordered">
        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Customer</th>
            <th>Item</th>
            <th>Qty</th>
            <th>Total</th>
        </tr>
        </thead>

        <tbody id="order_tbody"></tbody>
    </table>

</div>


<script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script type="module" src="controller/OrderController.js"></script>


</body>
</html>
