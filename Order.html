

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Order Management</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="p-4">

<h2 class="text-center mb-4">Order Management</h2>

<!-- from -->
<div class="container w-50">

    <form>

        <!-- order id -->
        <div class="mb-3">
            <label>Order ID</label>
            <input type="text" id="order_id" class="form-control">
        </div>

        <!-- customer id-->
        <div class="mb-3">
            <label>Customer ID</label>
            <input type="text" id="order_customer_id" class="form-control">
        </div>

        <!-- item id -->
        <div class="mb-3">
            <label>Item ID</label>
            <input type="text" id="order_item_id" class="form-control">
        </div>

        <!-- qty -->
        <div class="mb-3">
            <label>Quantity</label>
            <input type="number" id="order_qty" class="form-control">
        </div>



    </form>
</div>

</body>
</html>
