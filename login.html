<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Coffee POS Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/CSS/styles.css">
</head>

<body class="d-flex justify-content-center align-items-center vh-100 bg-light">

<div class="card p-4 shadow" style="width: 350px;">

    <h3 class="text-center mb-3">☕ Coffee Shop</h3>
    <p class="text-center text-muted">Login to continue</p>

    <!-- username -->
    <div class="mb-3">
        <label>Username</label>
        <input type="text" id="username" class="form-control">
    </div>

    <!-- password -->
    <div class="mb-3">
        <label>Password</label>
        <input type="password" id="password" class="form-control">
    </div>

    <!-- button -->
    <button id="login_btn" class="btn w-100 coffee-btn">
        Login
    </button>

</div>

<!-- JS -->
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script>
    $('#login_btn').on('click', function () {

        let user = $('#username').val();
        let pass = $('#password').val();

        if(user === "admin" && pass === "1234"){
            Swal.fire({
                icon: "success",
                title: "Login Success"
            }).then(()=>{
                window.location.href = "index.html"; // go to POS
            });
        } else {
            Swal.fire({
                icon: "error",
                title: "Invalid Username or Password"
            });
        }
    });
</script>

</body>
</html>
