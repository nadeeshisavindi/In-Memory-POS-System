<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Coffee POS Login</title>


    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/CSS/styles.css">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/CSS/styles.css">
</head>

<body class="login-body d-flex justify-content-center align-items-center vh-100">

<div class="card p-4 shadow" style="width: 350px;">

    <!-- image -->


   <img src="assets/lib/image/last.jpg" height="400" width="300"/>
    <h3 class="text-center mb-3">Coffee Shop</h3>
    <p class="text-center text-muted">Login to continue</p>

    <!-- username -->
    <div class="mb-3">
        <label>Username</label>
        <input type="text" id="username" class="form-control">
    </div>

    <!-- password -->
    <div class="mb-3">
        <label>Password</label>
        <input type="password" id="password" class="form-control">
    </div>

    <!-- button -->
    <button id="login_btn" class="btn w-100 coffee-btn">
        Login
    </button>

</div>


<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="assets/JS.js"></script>


</body>
</html>
