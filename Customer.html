<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Customer Management</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="p-4">

<h2 class="text-center mb-4">Customer Management</h2>


<div class="container w-50">

    <form>

        <div class="mb-3">
            <label>ID</label>
            <input type="text" id="cust_id" class="form-control">
        </div>

        <div class="mb-3">
            <label>Name</label>
            <input type="text" id="cust_name" class="form-control">
        </div>

        <div class="mb-3">
            <label>Address</label>
            <input type="text" id="cust_address" class="form-control">
        </div>

        <div class="mb-3">
            <label>Phone</label>
            <input type="text" id="cust_contact" class="form-control">
        </div>

        <div class="text-end">
            <button type="button" id="cust_save_btn" class="btn btn-success">Save</button>
            <button type="button" id="cust_update_btn" class="btn btn-primary">Update</button>
            <button type="button" id="cust_delete_btn" class="btn btn-danger">Delete</button>
            <button type="reset" id="cust_reset_btn" class="btn btn-secondary">Reset</button>
        </div>

    </form>
</div>

<!-- table -->
<div class="container mt-5">
    <table class="table table-bordered">
        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Address</th>
            <th>Phone</th>
        </tr>
        </thead>

        <tbody id="cust_tbody"></tbody>
    </table>
</div>


<script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script type="module" src="controller/CustomerController.js"></script>

</body>
</html>
