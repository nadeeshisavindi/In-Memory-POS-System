
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Item Management</title>


    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="p-4">

<h2 class="text-center mb-4">Item Management</h2>

<div class="container w-50">

    <form>


        <div class="mb-3">
            <label>Item ID</label>
            <input type="text" id="item_id" class="form-control">
        </div>


        <div class="mb-3">
            <label>Name</label>
            <input type="text" id="item_name" class="form-control">
        </div>

        <div class="mb-3">
            <label>Price</label>
            <input type="number" id="item_price" class="form-control">
        </div>


        <div class="mb-3">
            <label>Qty</label>
            <input type="number" id="item_qty" class="form-control">
        </div>


        <div class="text-end">
            <button type="button" id="item_save_btn" class="btn btn-success">Save</button>
            <button type="button" id="item_update_btn" class="btn btn-primary">Update</button>
            <button type="button" id="item_delete_btn" class="btn btn-danger">Delete</button>
            <button type="reset" id="item_reset_btn" class="btn btn-secondary">Reset</button>
        </div>

    </form>
</div>


<div class="container mt-5">

    <table class="table table-bordered">
        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Price</th>
            <th>Qty</th>
        </tr>
        </thead>

        <tbody id="item_tbody">
        </tbody>

    </table>

</div>

<script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script type="module" src="controller/ItemController.js"></script>
<script src="controller/SidebarController.js"></script>
</body>
</html>
